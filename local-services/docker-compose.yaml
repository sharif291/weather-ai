services:
  postgres:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ui
    restart: always
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./servers.json:/pgadmin4/servers.json:ro

  redis:
    image: redis:7-alpine
    container_name: redis_db
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-ui:
    image: rediscommander/redis-commander:latest
    platform: linux/amd64
    container_name: redis_ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081"]
      interval: 10s
      timeout: 3s
      retries: 5

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    container_name: elasticmq
    restart: always
    ports:
      - "9324:9324"  # ElasticMQ SQS API port
      - "9325:9325"  # ElasticMQ admin/management port
    volumes:
      - ./elasticmq.conf:/opt/docker/elasticmq.conf
    command: ["-Dconfig.file=/opt/docker/elasticmq.conf"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9324"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
